<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TFT Set 17 FAQ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #c9a84c;
      letter-spacing: 0.02em;
    }

    #chat {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      max-width: 90%;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: #1f6feb;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.bot {
      background: #161b22;
      border: 1px solid #30363d;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble.error {
      background: #3d1a1a;
      border: 1px solid #6e2c2c;
      align-self: flex-start;
      color: #f85149;
    }

    .typing {
      color: #8b949e;
      font-style: italic;
    }

    #form {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 8px;
    }

    #input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: #c9a84c; }

    #input::placeholder { color: #6e7681; }

    button {
      background: #c9a84c;
      color: #0d1117;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #e2bf6a; }
    button:disabled { background: #4a3d1c; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>TFT Set 17 FAQ</h1>
  <div id="chat"></div>
  <form id="form">
    <input id="input" type="text" placeholder="Ask about items, champions, comps, augments…" autocomplete="off" />
    <button id="btn" type="submit">Ask</button>
  </form>

  <script>
    const API_URL = window.TFT_API_URL || "https://tft-set17-faq-chatbot.onrender.com";

    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const btn = document.getElementById("btn");

    function addBubble(text, role) {
      const el = document.createElement("div");
      el.className = `bubble ${role}`;
      el.textContent = text;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;

      addBubble(q, "user");
      input.value = "";
      btn.disabled = true;

      const typing = addBubble("Thinking…", "bot typing");

      try {
        const res = await fetch(`${API_URL}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          typing.className = "bubble error";
          typing.textContent = `Error: ${err.detail || res.statusText}`;
        } else {
          const data = await res.json();
          typing.className = "bubble bot";
          typing.textContent = data.answer;
        }
      } catch (err) {
        typing.className = "bubble error";
        typing.textContent = `Could not reach the server. Is the backend running?\n${err.message}`;
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
